receivers:
  k8s_podlog:
    namespaces: [payment, api-gateway]
    pod_label_selector: app.kubernetes.io/part-of=payments
    since_seconds: 300
    api_config:
      auth_type: serviceAccount
      kube_api_qps: 20
      kube_api_burst: 40
    reconnect_backoff:
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m

processors:
  nop:

exporters:
  nop:

service:
  pipelines:
    logs:
      receivers: [k8s_podlog]
      processors: [nop]
      exporters: [nop]