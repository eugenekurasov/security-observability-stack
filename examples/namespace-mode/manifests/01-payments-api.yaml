# Sample application: payments-api
#
# Simulates a tenant service. Uses nginx:alpine as a stand-in for any HTTP
# service that writes structured logs to stdout and exposes Prometheus metrics.
#
# What the collector picks up from this pod:
#   logs    — stdout/stderr streamed via k8spodlogreceiver
#   metrics — scraped at /metrics:9113 (nginx-prometheus-exporter sidecar)
#   events  — OOMKills, restarts, scheduling failures in the payments namespace
#   traces  — accepted on OTLP gRPC/HTTP from the app (instrument separately)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/part-of: payments-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
        app.kubernetes.io/part-of: payments-platform
        app.kubernetes.io/version: "1.0.0"
      annotations:
        # Tells the Prometheus receiver in the collector to scrape this pod.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run

        # Sidecar that exposes nginx stub_status as Prometheus /metrics.
        # Replace with your own metrics endpoint in a real service.
        - name: metrics
          image: nginx/nginx-prometheus-exporter:1.1.0
          args: ["--nginx.scrape-uri=http://localhost:8080/stub_status"]
          ports:
            - name: metrics
              containerPort: 9113
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
        - name: var-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: payments
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/part-of: payments-platform
spec:
  selector:
    app.kubernetes.io/name: payments-api
  ports:
    - name: http
      port: 80
      targetPort: http
