name: Integration Tests — k8spodlogreceiver

on:
  push:
    branches: [main]
    paths:
      - 'otel-components/k8spodlogreceiver/**'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'otel-components/k8spodlogreceiver/**'
      - '.github/workflows/integration.yml'

jobs:
  integration:
    name: k8s ${{ matrix.k8s-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # run all three even if one fails
      matrix:
        include:
          # Verify exact patch tags at https://github.com/kubernetes-sigs/kind/releases
          - k8s-version: "1.36"
            kind-image: "kindest/node:v1.36.1"
          - k8s-version: "1.35"
            kind-image: "kindest/node:v1.35.5"
          - k8s-version: "1.34"
            kind-image: "kindest/node:v1.34.8"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: otel-components/k8spodlogreceiver/go.mod
          cache-dependency-path: otel-components/k8spodlogreceiver/go.sum

      - name: Cache vendor
        id: cache-vendor
        uses: actions/cache@v6
        with:
          path: otel-components/k8spodlogreceiver/vendor
          key: ${{ runner.os }}-go-vendor-${{ hashFiles('otel-components/k8spodlogreceiver/go.sum') }}

      - name: Vendor dependencies
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        working-directory: otel-components/k8spodlogreceiver
        run: go mod vendor

      - name: Create kind cluster (k8s ${{ matrix.k8s-version }})
        uses: helm/kind-action@v1
        with:
          node_image: ${{ matrix.kind-image }}
          cluster_name: k8spodlog-test

      - name: Run tests
        working-directory: otel-components/k8spodlogreceiver
        run: go test -v -mod=vendor -tags integration -timeout 120s ./...
